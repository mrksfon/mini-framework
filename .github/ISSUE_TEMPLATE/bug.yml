name: Bug report
description: Report unexpected framework behavior
title: "[Bug]: "
labels:
  - "type:bug"
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clearly describe the problem.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Provide the smallest example that reproduces the issue.
      placeholder: |
        1. Register this route...
        2. Send this request...
        3. Observe this result...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What happened instead?
    validations:
      required: true

  - type: input
    id: php-version
    attributes:
      label: PHP Version
      placeholder: "8.5.7"
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched for an existing issue before opening this report
          required: true